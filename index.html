<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Games Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🎮 Web Games Portal</h1>
        <p>A collection of browser-based games with gn-math support</p>
    </header>

    <main>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search games...">
        </div>

        <div class="games-grid" id="gamesGrid">
            <!-- Games will be dynamically loaded here -->
        </div>

        <section class="add-game">
            <h2>Add Your Own Game</h2>
            <p>Fork this repository and add your game to the <code>games/</code> directory or link to an external repository!</p>
            <a href="https://github.com/yourusername/web-games-portal" class="github-link">View on GitHub</a>
        </section>
    </main>

    <footer>
        <p>Powered by GitHub Pages | <a href="https://github.com/yourusername/web-games-portal">Contribute</a></p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
